name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  repo-hygiene:
    name: Repo Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate repository metadata
        run: jq empty .github/github.json

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            README.md
            AGENTS.md
            docs/*.md
            docs/**/*.md
            patches/**/*.md

      - name: Lint GitHub Actions workflows
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error
          reporter: github-check

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}"
          checksum_url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          curl -sSfLO "$url"
          curl -sSfL "$checksum_url" | grep "  ${archive}$" | sha256sum -c -
          tar -xzf "$archive" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

      - name: Secret scan tracked files
        run: gitleaks detect --source . --no-git --redact --verbose
