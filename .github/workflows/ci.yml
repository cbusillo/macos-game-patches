name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: read

jobs:
  repo-hygiene:
    name: Repo Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository metadata
        run: jq empty .github/github.json

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            README.md
            AGENTS.md
            docs/**/*.md

      - name: Lint GitHub Actions workflows
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error
          reporter: github-check

      - name: Secret scan tracked files
        uses: docker://ghcr.io/gitleaks/gitleaks:v8.30.1
        with:
          args: detect --source . --no-git --redact --verbose
